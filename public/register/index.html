<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="aigs-api-base-url" content="" />
  <title>注册 | AI Generation Station</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/reset.css" />
  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/index.css" />
  <link rel="stylesheet" href="/css/chat-message.css" />
  <link rel="stylesheet" href="/css/chat-workspace.css" />
  <link rel="stylesheet" href="/css/chat-dropdown.css" />
  <link rel="stylesheet" href="/css/workspace-responsive.css" />
  <link rel="stylesheet" href="/css/auth-gate.css" />
  <link rel="stylesheet" href="/css/templates.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <link rel="stylesheet" href="/css/portal.css" />
  <link rel="stylesheet" href="/css/auth.css" />
  <link rel="stylesheet" href="/css/portal-components.css" />
  <link rel="stylesheet" href="/css/account.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body class="auth-simple-page auth-simple-page--register" data-auth-default-mode="register">
  <div id="portal-user-nav"></div>

  <div class="theme-toggle-fixed auth-theme-toggle">
    <button class="theme-btn" id="theme-toggle" type="button" aria-label="切换主题" data-tip="深色模式">
      <span class="sun-icon">☀️</span>
      <span class="moon-icon">🌙</span>
      <span class="paper-icon">📒</span>
    </button>
  </div>

  <main class="auth-simple-shell" aria-labelledby="register-title">
    <section class="auth-simple-card">
      <div class="auth-simple-head" id="auth-entry-head">
        <a class="auth-simple-brand" href="/" aria-label="返回工作台">
          <span>AI</span>
          <strong>Generation Station</strong>
        </a>
        <h1 id="register-title">注册账号</h1>
      </div>

      <section class="portal-form-pane auth-simple-pane" id="auth-pane-register">
        <form id="register-form" class="auth-form auth-simple-form">
          <div class="portal-grid-2 auth-simple-field-grid">
            <label>账号<input id="register-username" type="text" autocomplete="username" placeholder="3-32 位账号" /></label>
            <label>显示名<input id="register-display-name" type="text" autocomplete="nickname" placeholder="可选，默认同账号" /></label>
          </div>
          <label>邮箱<input id="register-email" type="email" autocomplete="email" placeholder="请输入邮箱地址" /></label>
          <div class="portal-grid-2 auth-simple-field-grid">
            <label>密码<input id="register-password" type="password" autocomplete="new-password" placeholder="至少 8 位" /></label>
            <label>确认密码<input id="register-confirm-password" type="password" autocomplete="new-password" placeholder="请再次输入密码" /></label>
          </div>
          <div id="register-feedback" class="portal-feedback" hidden></div>
          <button class="btn btn-primary auth-simple-submit" type="submit">注册</button>
        </form>
        <div class="auth-route-links auth-simple-links" aria-label="注册相关入口">
          <a href="/login/">已有账号登录</a>
          <a href="/auth/">找回密码</a>
        </div>
      </section>
    </section>
  </main>

  <div id="toast-container" class="toast-container"></div>

  <script src="/js/app-shell.js"></script>
  <script src="/js/site-shell.js"></script>
  <script src="/js/auth-page.js"></script>
</body>
</html>
