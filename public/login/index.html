<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="aigs-api-base-url" content="" />
  <title>登录 | AI Generation Station</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/reset.css" />
  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/index.css" />
  <link rel="stylesheet" href="/css/chat-message.css" />
  <link rel="stylesheet" href="/css/chat-workspace.css" />
  <link rel="stylesheet" href="/css/chat-dropdown.css" />
  <link rel="stylesheet" href="/css/workspace-responsive.css" />
  <link rel="stylesheet" href="/css/auth-gate.css" />
  <link rel="stylesheet" href="/css/templates.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <link rel="stylesheet" href="/css/portal.css" />
  <link rel="stylesheet" href="/css/auth.css" />
  <link rel="stylesheet" href="/css/portal-components.css" />
  <link rel="stylesheet" href="/css/account.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body class="auth-simple-page auth-simple-page--login" data-auth-default-mode="login">
  <div id="portal-user-nav"></div>

  <div class="theme-toggle-fixed auth-theme-toggle">
    <button class="theme-btn" id="theme-toggle" type="button" aria-label="切换主题" data-tip="深色模式">
      <span class="sun-icon">☀️</span>
      <span class="moon-icon">🌙</span>
      <span class="paper-icon">📒</span>
    </button>
  </div>

  <main class="auth-simple-shell" aria-labelledby="login-title">
    <section class="auth-simple-card">
      <div class="auth-simple-head" id="auth-entry-head">
        <a class="auth-simple-brand" href="/" aria-label="返回工作台">
          <img class="auth-simple-brand-logo" src="/images/AG-logo.png" alt="" aria-hidden="true" />
          <span class="auth-simple-brand-copy">
            <strong>AI</strong>
            <span>Generation</span>
            <em>Station</em>
          </span>
        </a>
        <h1 id="login-title">登录</h1>
      </div>

      <section class="portal-form-pane auth-simple-pane" id="auth-pane-login">
        <form id="login-form" class="auth-form auth-simple-form">
          <label>账号<input id="login-username" type="text" autocomplete="username" placeholder="请输入账号" /></label>
          <label>密码<input id="login-password" type="password" autocomplete="current-password" placeholder="请输入密码" /></label>
          <div id="login-feedback" class="portal-feedback" hidden></div>
          <button class="btn btn-primary auth-simple-submit" type="submit">登录</button>
        </form>
        <div class="auth-route-links auth-simple-links" aria-label="登录相关入口">
          <a href="/register/">注册账号</a>
          <a href="/auth/">找回密码</a>
        </div>
      </section>
    </section>
  </main>

  <div id="toast-container" class="toast-container" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="/js/app-shell.js"></script>
  <script src="/js/site-shell.js"></script>
  <script src="/js/auth-page.js"></script>
</body>
</html>
